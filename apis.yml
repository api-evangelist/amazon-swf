apis:
- aid: amazon-swf:amazon-swf-api
  name: Amazon Simple Workflow Service API
  description: >-
    The Amazon SWF API provides programmatic access to manage workflows,
    activity tasks, decision tasks, and workflow execution history. It enables
    developers to coordinate distributed application components using
    asynchronous task processing and state tracking.
