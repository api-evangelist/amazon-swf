aid: amazon-swf
name: Amazon Simple Workflow Service
description: >-
  Amazon Simple Workflow Service (Amazon SWF) helps developers build, run, and
  scale background jobs that have parallel or sequential steps. It is a fully
  managed state tracker and task coordinator in the cloud that manages intertask
  dependencies, scheduling, and concurrency for application workflows.
